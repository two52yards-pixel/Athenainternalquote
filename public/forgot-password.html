<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Athena Marine Quote Desk</title>
  <link rel="icon" href="https://athenamarine.co.uk/logo/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="main-b2b.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

  <header class="top-nav" aria-label="Primary">
    <div class="top-nav-inner">
      <a href="/login.html" class="brand" aria-label="Athena Marine Quote Desk">
        <img src="50.png" alt="Athena Marine logo" class="brand-logo">
        <span class="brand-text">Athena Marine — Quote Desk</span>
      </a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <h1>Reset password</h1>
      <p class="auth-subtitle">Enter your email and we'll send a reset link</p>

      <div id="alert" class="auth-alert alert-error" role="alert" aria-live="polite">
        <i class="ti ti-alert-circle" aria-hidden="true"></i>
        <span id="alert-text"></span>
      </div>

      <!-- Shown after successful submission -->
      <div id="sent-state" style="display:none;text-align:center;padding:0.5rem 0 1rem">
        <i class="ti ti-mail-check"
           style="font-size:2.75rem;color:var(--navy);display:block;margin-bottom:0.9rem"
           aria-hidden="true"></i>
        <p style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:0.4rem">
          Check your inbox
        </p>
        <p style="font-size:13px;color:var(--muted)">
          If this email is registered, a password reset link has been sent.<br>
          The link expires in <strong>1 hour</strong>.
        </p>
        <a href="/login.html"
           style="display:inline-block;margin-top:1.4rem;font-size:13px;color:var(--navy);font-weight:500;text-decoration:none">
          ← Back to sign in
        </a>
      </div>

      <form id="forgot-form" autocomplete="off" novalidate>
        <div class="auth-field">
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" autocomplete="off"
                 placeholder="you@example.com" required>
        </div>

        <button type="submit" class="auth-btn" id="submit-btn">
          <i class="ti ti-send" aria-hidden="true"></i>
          Send reset link
        </button>
      </form>

      <hr class="auth-divider" id="divider">
      <div class="auth-links" id="back-link">
        <a href="/login.html">← Back to sign in</a>
      </div>

    </div>
  </main>

  <script>
    const form      = document.getElementById('forgot-form');
    const alertEl   = document.getElementById('alert');
    const alertTxt  = document.getElementById('alert-text');
    const sentState = document.getElementById('sent-state');
    const btn       = document.getElementById('submit-btn');
    const divider   = document.getElementById('divider');
    const backLink  = document.getElementById('back-link');

    function showError(msg) {
      alertTxt.textContent = msg;
      alertEl.classList.add('visible');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<i class="ti ti-loader-2 spin" aria-hidden="true"></i> Sending…'
        : '<i class="ti ti-send" aria-hidden="true"></i> Send reset link';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.classList.remove('visible');

      const email = form.email.value.trim();
      if (!email) { showError('Please enter your email address.'); return; }

      setLoading(true);

      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Something went wrong. Please try again.');
          setLoading(false);
          return;
        }

        // Always show the sent state (prevents email enumeration)
        form.style.display    = 'none';
        divider.style.display = 'none';
        backLink.style.display = 'none';
        sentState.style.display = 'block';
      } catch {
        showError('Unable to connect. Please try again.');
        setLoading(false);
      }
    });
  </script>

</body>
</html>
