<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Athena Marine Quote Desk</title>
  <link rel="icon" href="https://athenamarine.co.uk/logo/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="main-b2b.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

  <header class="top-nav" aria-label="Primary">
    <div class="top-nav-inner">
      <a href="/login.html" class="brand" aria-label="Athena Marine Quote Desk">
        <img src="50.png" alt="Athena Marine logo" class="brand-logo">
        <span class="brand-text">Athena Marine — Quote Desk</span>
      </a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <h1>Sign in</h1>
      <p class="auth-subtitle">Access the Athena Marine Quote Desk</p>

      <div id="alert" class="auth-alert alert-error" role="alert" aria-live="polite">
        <i class="ti ti-alert-circle" aria-hidden="true"></i>
        <span id="alert-text"></span>
      </div>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="auth-field">
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" autocomplete="off"
                 placeholder="you@example.com" required>
        </div>

        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" autocomplete="new-password"
                 placeholder="••••••••" required>
        </div>

        <div style="text-align:right;margin:-0.4rem 0 1rem">
          <a href="/forgot-password.html" style="font-size:12.5px;color:var(--navy);text-decoration:none;font-weight:500">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="auth-btn" id="submit-btn">
          <i class="ti ti-login" aria-hidden="true"></i>
          Sign in
        </button>
      </form>

      <hr class="auth-divider">

      <div class="auth-links">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>

    </div>
  </main>

  <script>
    const form     = document.getElementById('login-form');
    const alertEl  = document.getElementById('alert');
    const alertTxt = document.getElementById('alert-text');
    const btn      = document.getElementById('submit-btn');

    function showError(msg) {
      alertTxt.textContent = msg;
      alertEl.classList.add('visible');
    }

    function clearError() {
      alertEl.classList.remove('visible');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<i class="ti ti-loader-2 spin" aria-hidden="true"></i> Signing in…'
        : '<i class="ti ti-login" aria-hidden="true"></i> Sign in';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email    = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed. Please try again.');
          setLoading(false);
          return;
        }

        window.location.href = '/';
      } catch {
        showError('Unable to connect. Please try again.');
        setLoading(false);
      }
    });
  </script>

</body>
</html>
