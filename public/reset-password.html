<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Athena Marine Quote Desk</title>
  <link rel="icon" href="https://athenamarine.co.uk/logo/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="main-b2b.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

  <header class="top-nav" aria-label="Primary">
    <div class="top-nav-inner">
      <a href="/login.html" class="brand" aria-label="Athena Marine Quote Desk">
        <img src="50.png" alt="Athena Marine logo" class="brand-logo">
        <span class="brand-text">Athena Marine — Quote Desk</span>
      </a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <!-- Loading state while token is validated -->
      <div id="loading-state" style="text-align:center;padding:0.5rem 0 1rem">
        <i class="ti ti-loader-2 spin"
           style="font-size:2rem;color:var(--navy);display:block;margin-bottom:0.75rem"
           aria-hidden="true"></i>
        <p style="font-size:13px;color:var(--muted)">Validating your link…</p>
      </div>

      <!-- Invalid / expired token -->
      <div id="invalid-state" style="display:none;text-align:center;padding:0.5rem 0 1rem">
        <i class="ti ti-link-off"
           style="font-size:2.75rem;color:var(--danger-strong);display:block;margin-bottom:0.9rem"
           aria-hidden="true"></i>
        <p style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:0.4rem"
           id="invalid-title">Link invalid</p>
        <p style="font-size:13px;color:var(--muted)" id="invalid-message">
          This reset link is invalid or has expired.
        </p>
        <a href="/forgot-password.html"
           style="display:inline-block;margin-top:1.4rem;font-size:13px;color:var(--navy);font-weight:500;text-decoration:none">
          Request a new link →
        </a>
      </div>

      <!-- Reset form (shown when token is valid) -->
      <div id="form-state" style="display:none">
        <h1>Set new password</h1>
        <p class="auth-subtitle">Choose a strong password for your account</p>

        <div id="alert" class="auth-alert alert-error" role="alert" aria-live="polite">
          <i class="ti ti-alert-circle" aria-hidden="true"></i>
          <span id="alert-text"></span>
        </div>

        <form id="reset-form" autocomplete="off" novalidate>
          <div class="auth-field">
            <label for="password">
              New password
              <span style="color:var(--muted);font-weight:400">(min. 8 characters)</span>
            </label>
            <input id="password" type="password" name="password" autocomplete="new-password"
                   placeholder="••••••••" required>
          </div>

          <div class="auth-field">
            <label for="confirmPassword">Confirm new password</label>
            <input id="confirmPassword" type="password" name="confirmPassword"
                   autocomplete="new-password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="auth-btn" id="submit-btn">
            <i class="ti ti-lock-check" aria-hidden="true"></i>
            Update password
          </button>
        </form>
      </div>

      <!-- Success state -->
      <div id="success-state" style="display:none;text-align:center;padding:0.5rem 0 1rem">
        <i class="ti ti-lock-check"
           style="font-size:2.75rem;color:var(--navy);display:block;margin-bottom:0.9rem"
           aria-hidden="true"></i>
        <p style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:0.4rem">
          Password updated
        </p>
        <p style="font-size:13px;color:var(--muted)">
          Your password has been changed successfully.
        </p>
        <a href="/login.html"
           style="display:inline-block;margin-top:1.4rem;font-size:13px;color:var(--navy);font-weight:500;text-decoration:none">
          Sign in now →
        </a>
      </div>

    </div>
  </main>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const token   = params.get('token');

    const loadingState = document.getElementById('loading-state');
    const invalidState = document.getElementById('invalid-state');
    const formState    = document.getElementById('form-state');
    const successState = document.getElementById('success-state');

    function showState(el) {
      [loadingState, invalidState, formState, successState].forEach(s => {
        s.style.display = s === el ? 'block' : 'none';
      });
    }

    // ---- Validate token on page load ----
    (async () => {
      if (!token) {
        document.getElementById('invalid-message').textContent =
          'No reset token found. Please request a new link.';
        showState(invalidState);
        return;
      }

      try {
        const res  = await fetch(`/api/auth/validate-reset-token?token=${encodeURIComponent(token)}`);
        const data = await res.json();

        if (!data.valid) {
          document.getElementById('invalid-message').textContent =
            data.error || 'This link is invalid or has expired.';
          showState(invalidState);
        } else {
          showState(formState);
        }
      } catch {
        document.getElementById('invalid-message').textContent =
          'Unable to validate link. Please try again.';
        showState(invalidState);
      }
    })();

    // ---- Reset form submission ----
    const form     = document.getElementById('reset-form');
    const alertEl  = document.getElementById('alert');
    const alertTxt = document.getElementById('alert-text');
    const btn      = document.getElementById('submit-btn');

    function showError(msg) {
      alertTxt.textContent = msg;
      alertEl.classList.add('visible');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<i class="ti ti-loader-2 spin" aria-hidden="true"></i> Updating…'
        : '<i class="ti ti-lock-check" aria-hidden="true"></i> Update password';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.classList.remove('visible');

      const password        = form.password.value;
      const confirmPassword = form.confirmPassword.value;

      if (password.length < 8)       { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

      setLoading(true);

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password, confirmPassword })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Password reset failed. Please try again.');
          setLoading(false);
          return;
        }

        showState(successState);
      } catch {
        showError('Unable to connect. Please try again.');
        setLoading(false);
      }
    });
  </script>

</body>
</html>
